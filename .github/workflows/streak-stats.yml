name: Update streak stats

on:
  schedule:
    - cron: "0 3 * * *" # 每天 UTC 03:00 自动更新
  push:
    paths:
      - ".github/workflows/streak-stats.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@v1.7.0
        with:
          options: user=${{ github.repository_owner }}&theme=gruvbox&hide_border=true&disable_animations=true
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit streak stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git diff --cached --quiet -- profile/streak.svg && exit 0
          git commit -m "Update streak stats"
          git push
